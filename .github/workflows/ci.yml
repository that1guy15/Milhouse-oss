name: Required CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "31 7 * * 3"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.11.29"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: ./scripts/run_make.py setup
      - run: ./scripts/run_make.py quality

  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: ./scripts/run_make.py test-coverage

  compatibility:
    name: compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: ./scripts/run_make.py test

  identity-portability:
    name: identity-portability (${{ matrix.python }})
    runs-on: macos-14
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: ./scripts/run_make.py identity-portability

  package:
    name: package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: ./scripts/run_make.py build
      - run: ./scripts/run_make.py package-check
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  artifact-smoke:
    name: artifact-smoke
    needs: [package]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/
      - run: ./scripts/run_make.py artifact-smoke

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: ./scripts/run_make.py secret-scan
      - run: ./scripts/run_make.py secret-scan-self-test

  audit:
    name: audit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: ./scripts/run_make.py audit
      - run: ./scripts/run_make.py license-check

  codeql:
    name: codeql
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # Required only to upload CodeQL analysis results.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          languages: python
      - uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          license-check: true
          deny-licenses: >-
            AGPL-1.0, AGPL-1.0-only, AGPL-1.0-or-later,
            AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later,
            GPL-1.0, GPL-1.0-only, GPL-1.0-or-later,
            GPL-2.0, GPL-2.0-only, GPL-2.0-or-later,
            GPL-3.0, GPL-3.0-only, GPL-3.0-or-later,
            LGPL-2.0, LGPL-2.0-only, LGPL-2.0-or-later,
            LGPL-2.1, LGPL-2.1-only, LGPL-2.1-or-later,
            LGPL-3.0, LGPL-3.0-only, LGPL-3.0-or-later
          # The canonical local license-check gate proves exact versions and dev-only paths.
          allow-dependencies-licenses: pkg:pypi/chardet, pkg:pypi/docutils
      - if: github.event_name != 'pull_request'
        run: test -f uv.lock

  dco:
    name: dco
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/check_dco.py --range "${BASE_SHA}..${HEAD_SHA}"
      - if: github.event_name == 'push'
        env:
          AFTER_SHA: ${{ github.event.after }}
          BEFORE_SHA: ${{ github.event.before }}
        run: python scripts/check_dco.py --range "${BEFORE_SHA}..${AFTER_SHA}"
      - if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/check_dco.py --range "HEAD^..HEAD"

  required-ci:
    name: required-ci
    if: always()
    needs:
      - quality
      - test
      - compatibility
      - package
      - artifact-smoke
      - gitleaks
      - identity-portability
      - audit
      - codeql
      - dependency-review
      - dco
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - env:
          ARTIFACT_SMOKE_RESULT: ${{ needs.artifact-smoke.result }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
          DCO_RESULT: ${{ needs.dco.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          IDENTITY_PORTABILITY_RESULT: ${{ needs.identity-portability.result }}
          PACKAGE_RESULT: ${{ needs.package.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: >-
          python scripts/required_ci.py
          --expected-job quality --result "quality=${QUALITY_RESULT}"
          --expected-job test --result "test=${TEST_RESULT}"
          --expected-job compatibility --result "compatibility=${COMPATIBILITY_RESULT}"
          --expected-job package --result "package=${PACKAGE_RESULT}"
          --expected-job artifact-smoke --result "artifact-smoke=${ARTIFACT_SMOKE_RESULT}"
          --expected-job gitleaks --result "gitleaks=${GITLEAKS_RESULT}"
          --expected-job identity-portability
          --result "identity-portability=${IDENTITY_PORTABILITY_RESULT}"
          --expected-job audit --result "audit=${AUDIT_RESULT}"
          --expected-job codeql --result "codeql=${CODEQL_RESULT}"
          --expected-job dependency-review
          --result "dependency-review=${DEPENDENCY_REVIEW_RESULT}"
          --expected-job dco --result "dco=${DCO_RESULT}"
