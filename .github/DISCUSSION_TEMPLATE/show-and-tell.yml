title: "[Show and tell] "
labels: ["discussion: show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        Share public-safe architecture only. Do not include credentials, real telemetry, private paths, raw agent content, generated reports, or user/customer data.
  - type: textarea
    id: setup
    attributes:
      label: What did you build with Milhouse?
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow or architecture
  - type: textarea
    id: lessons
    attributes:
      label: What worked or did not work?
