title: "[Idea] "
labels: ["discussion: idea"]
body:
  - type: markdown
    attributes:
      value: |
        Use synthetic examples only. Do not include credentials, real telemetry, private paths, raw agent content, generated reports, or user/customer data.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What should Milhouse help teams observe or improve?
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: Who benefits?
  - type: textarea
    id: signal
    attributes:
      label: What signal would prove it works?
